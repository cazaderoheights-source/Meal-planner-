<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List - Simple Meals</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .back-link { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
        h1 { color: #2e7d32; margin-bottom: 20px; font-size: 2.5em; }
        .refresh-button { width: 100%; padding: 15px; margin-bottom: 20px; background: #ff9800; color: white; border: none; border-radius: 10px; font-size: 1.1em; font-weight: bold; cursor: pointer; }
        .refresh-button:hover { background: #f57c00; }
        .category { background: #f8f9fa; padding: 25px; border-radius: 10px; margin-bottom: 25px; border-left: 5px solid #4caf50; }
        .category h2 { color: #388e3c; margin-bottom: 15px; font-size: 1.5em; }
        .category ul { list-style: none; margin-left: 0; }
        .item-row { margin-bottom: 15px; display: flex; align-items: center; padding: 10px; border-radius: 5px; background: white; }
        .item-row:hover { background: #e8f5e9; }
        .item-text { flex: 1; font-size: 1.1em; line-height: 1.6; }
        .custom-checkbox { width: 30px; height: 30px; min-width: 30px; border: 3px solid #667eea; border-radius: 5px; margin-left: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: white; }
        .custom-checkbox.checked { background: #667eea; }
        .custom-checkbox.checked::after { content: '✓'; color: white; font-size: 20px; font-weight: bold; }
        .checked-text { text-decoration: line-through; opacity: 0.5; }
        .meat { border-left-color: #e53935; }
        .meat h2 { color: #c62828; }
        .veggies { border-left-color: #43a047; }
        .veggies h2 { color: #2e7d32; }
        .spices { border-left-color: #fb8c00; }
        .spices h2 { color: #e65100; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:window.close()" class="back-link">← Close</a>
        <h1>📋 Shopping List</h1>
        <button class="refresh-button" onclick="refreshList()">🔄 Remove Checked Items</button>
        <div id="shoppingContent"></div>
    </div>
    <script>
        const meatKeywords = ['chicken', 'beef', 'pork', 'sausage', 'bacon', 'turkey', 'lamb', 'salmon', 'fish', 'shrimp', 'tuna', 'thighs', 'ground'];
        const veggieKeywords = ['onion', 'garlic', 'pepper', 'tomato', 'broccoli', 'carrot', 'potato', 'zucchini', 'spinach', 'lettuce', 'cucumber', 'celery', 'mushroom', 'bean', 'chickpea', 'vegetable', 'rice', 'pasta', 'bread', 'tortilla', 'cheese', 'milk', 'egg', 'yogurt', 'butter', 'oil', 'broth', 'coconut', 'lemon', 'lime', 'berries', 'fruit'];
        const spiceKeywords = ['salt', 'pepper', 'paprika', 'cumin', 'chili', 'oregano', 'basil', 'thyme', 'rosemary', 'cinnamon', 'ginger', 'curry', 'seasoning', 'dill', 'parsley', 'cilantro', 'italian', 'garlic powder', 'onion powder'];
        
        let allIngredients = [];
        let checkedItems = new Set();
        
        function categorizeIngredient(ingredient) {
            const lower = ingredient.toLowerCase();
            if (spiceKeywords.some(keyword => lower.includes(keyword))) return 'spices';
            if (meatKeywords.some(keyword => lower.includes(keyword))) return 'meat';
            return 'veggies';
        }
        
        function toggleItem(index) {
            const checkbox = document.getElementById(`check-${index}`);
            const itemText = document.getElementById(`item-${index}`);
            
            if (checkedItems.has(index)) {
                checkedItems.delete(index);
                checkbox.classList.remove('checked');
                itemText.classList.remove('checked-text');
            } else {
                checkedItems.add(index);
                checkbox.classList.add('checked');
                itemText.classList.add('checked-text');
            }
        }
        
        function refreshList() {
            const newIngredients = [];
            allIngredients.forEach((ing, index) => {
                if (!checkedItems.has(index)) {
                    newIngredients.push(ing);
                }
            });
            
            allIngredients = newIngredients;
            checkedItems.clear();
            displayShoppingList();
        }
        
        function displayShoppingList() {
            const stored = localStorage.getItem('mealPlan');
            
            if (!stored) {
                document.getElementById('shoppingContent').innerHTML = '<p>No meal plan found!</p>';
                return;
            }
            
            if (allIngredients.length === 0) {
                const mealPlan = JSON.parse(stored);
                const recipes = mealPlan.recipes;
                recipes.forEach(recipe => {
                    recipe.ingredients.forEach(ing => {
                        allIngredients.push(ing);
                    });
                });
            }
            
            const categorized = { meat: [], veggies: [], spices: [] };
            
            allIngredients.forEach((ing, index) => {
                const category = categorizeIngredient(ing);
                categorized[category].push({ text: ing, index: index });
            });
            
            let html = '';
            
            if (categorized.meat.length > 0) {
                html += `<div class="category meat">
                    <h2>🥩 Meat & Protein</h2>
                    <ul>${categorized.meat.map(item => `
                        <div class="item-row">
                            <span class="item-text" id="item-${item.index}">${item.text}</span>
                            <div class="custom-checkbox" id="check-${item.index}" onclick="toggleItem(${item.index})"></div>
                        </div>
                    `).join('')}</ul>
                </div>`;
            }
            
            if (categorized.veggies.length > 0) {
                html += `<div class="category veggies">
                    <h2>🥬 Vegetables & Other</h2>
                    <ul>${categorized.veggies.map(item => `
                        <div class="item-row">
                            <span class="item-text" id="item-${item.index}">${item.text}</span>
                            <div class="custom-checkbox" id="check-${item.index}" onclick="toggleItem(${item.index})"></div>
                        </div>
                    `).join('')}</ul>
                </div>`;
            }
            
            if (categorized.spices.length > 0) {
                html += `<div class="category spices">
                    <h2>🌶️ Spices & Seasonings</h2>
                    <ul>${categorized.spices.map(item => `
                        <div class="item-row">
                            <span class="item-text" id="item-${item.index}">${item.text}</span>
                            <div class="custom-checkbox" id="check-${item.index}" onclick="toggleItem(${item.index})"></div>
                        </div>
                    `).join('')}</ul>
                </div>`;
            }
            
            document.getElementById('shoppingContent').innerHTML = html;
        }
        
        displayShoppingList();
    </script>
</body>
</html>
