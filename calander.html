<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Calendar - Simple Meals</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { color: #667eea; margin-bottom: 10px; font-size: 2.5em; }
        .subtitle { color: #666; margin-bottom: 20px; font-size: 1.1em; }
        .back-link { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .control-group { margin-bottom: 25px; padding: 20px; background: #f8f9fa; border-radius: 10px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: #555; font-size: 1.1em; }
        .value-display { color: #667eea; font-weight: bold; }
        input[type="range"] { width: 100%; height: 8px; border-radius: 5px; background: #ddd; outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #667eea; cursor: pointer; }
        .calendar { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .calendar th { background: #667eea; color: white; padding: 15px 10px; text-align: center; font-size: 1.1em; }
        .calendar td { border: 2px solid #ddd; padding: 15px; vertical-align: top; height: 120px; }
        .meal-label { font-weight: bold; color: #667eea; margin-bottom: 8px; font-size: 0.9em; }
        .meal-content { color: #555; font-size: 0.95em; line-height: 1.4; }
        .leftover { color: #888; font-style: italic; }
        .shopping-list { background: #e8f5e9; padding: 25px; border-radius: 10px; margin-top: 30px; border-left: 5px solid #4caf50; }
        .shopping-list h3 { color: #2e7d32; margin-bottom: 20px; font-size: 1.5em; }
        .category { margin-bottom: 20px; }
        .category h4 { color: #388e3c; margin-bottom: 10px; font-size: 1.2em; }
        .category ul { margin-left: 20px; line-height: 1.8; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to Meal Planner</a>
        <h1>📅 Weekly Calendar</h1>
        <p class="subtitle">Your meals organized day by day</p>
        
        <div class="control-group">
            <label>Breakfast options per day: <span class="value-display" id="breakfastCount">2</span></label>
            <input type="range" id="breakfastSlider" min="1" max="3" value="2">
        </div>

        <table class="calendar" id="calendar">
            <thead>
                <tr>
                    <th style="width: 100px;">Meal</th>
                    <th>Monday</th>
                    <th>Tuesday</th>
                    <th>Wednesday</th>
                    <th>Thursday</th>
                    <th>Friday</th>
                    <th>Saturday</th>
                    <th>Sunday</th>
                </tr>
            </thead>
            <tbody id="calendarBody">
            </tbody>
        </table>

        <div class="shopping-list" id="shoppingList"></div>
    </div>

    <script>
        const breakfastOptions = ["Oatmeal with fruit", "Scrambled eggs and toast", "Greek yogurt with granola"];
        const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
        
        let mealPlan = null;
        let breakfastCount = 2;

        // Load meal plan from localStorage
        function loadMealPlan() {
            const stored = localStorage.getItem('mealPlan');
            if (stored) {
                mealPlan = JSON.parse(stored);
            }
        }

        // Update breakfast count
        document.getElementById('breakfastSlider').addEventListener('input', function() {
            breakfastCount = parseInt(this.value);
            document.getElementById('breakfastCount').textContent = breakfastCount;
            generateCalendar();
        });

        function generateCalendar() {
            if (!mealPlan || !mealPlan.recipes || mealPlan.recipes.length === 0) {
                document.getElementById('calendarBody').innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px;">Please generate a meal plan first from the main page!</td></tr>';
                return;
            }

            const selectedBreakfasts = breakfastOptions.slice(0, breakfastCount);
            const dinnerRecipes = mealPlan.recipes;
            
            // Distribute dinners across the week
            const dinnerSchedule = [];
            let recipeIndex = 0;
            for (let day = 0; day < 7; day++) {
                dinnerSchedule.push(dinnerRecipes[recipeIndex]);
                recipeIndex = (recipeIndex + 1) % dinnerRecipes.length;
            }

            // Build calendar rows
            let html = '';
            
            // Breakfast row
            html += '<tr><td class="meal-label">Breakfast</td>';
            for (let day = 0; day < 7; day++) {
                html += '<td><div class="meal-content">';
                selectedBreakfasts.forEach(b => {
                    html += `${b}<br>`;
                });
                html += '</div></td>';
            }
            html += '</tr>';

            // Lunch row
            html += '<tr><td class="meal-label">Lunch</td>';
            for (let day = 0; day < 7; day++) {
                const prevDayDinner = day > 0 ? dinnerSchedule[day - 1].name : dinnerSchedule[6].name;
                html += `<td><div class="meal-content leftover">Leftovers: ${prevDayDinner}</div></td>`;
            }
            html += '</tr>';

            // Dinner row
            html += '<tr><td class="meal-label">Dinner</td>';
            for (let day = 0; day < 7; day++) {
                html += `<td><div class="meal-content">${dinnerSchedule[day].name}</div></td>`;
            }
            html += '</tr>';

            document.getElementById('calendarBody').innerHTML = html;

            // Generate shopping list
            generateShoppingList(selectedBreakfasts, dinnerRecipes);
        }

        function generateShoppingList(breakfasts, dinners) {
            const breakfastIngredients = {
                "Oatmeal with fruit": ["Rolled oats", "Milk or water", "Fresh or frozen berries", "Honey or brown sugar"],
                "Scrambled eggs and toast": ["Eggs (1 dozen)", "Bread (1 loaf)", "Butter", "Salt and pepper"],
                "Greek yogurt with granola": ["Greek yogurt (large container)", "Granola", "Fresh berries", "Honey"]
            };

            let html = '<h3>📋 Complete Shopping List</h3>';
            
            // Breakfast ingredients
            html += '<div class="category"><h4>Breakfast Ingredients:</h4><ul>';
            breakfasts.forEach(b => {
                if (breakfastIngredients[b]) {
                    breakfastIngredients[b].forEach(ing => {
                        html += `<li>${ing}</li>`;
                    });
                }
            });
            html += '</ul></div>';

            // Dinner ingredients
            html += '<div class="category"><h4>Dinner Ingredients:</h4><ul>';
            const allDinnerIngredients = {};
            dinners.forEach(recipe => {
                recipe.ingredients.forEach(ing => {
                    const key = ing.split(' ').slice(1).join(' ');
                    if (!allDinnerIngredients[key]) allDinnerIngredients[key] = [];
                    allDinnerIngredients[key].push(ing);
                });
            });
            Object.values(allDinnerIngredients).flat().forEach(ing => {
                html += `<li>${ing}</li>`;
            });
            html += '</ul></div>';

            document.getElementById('shoppingList').innerHTML = html;
        }

        // Initialize on page load
        loadMealPlan();
        generateCalendar();
    </script>
</body>
</html>
