<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Meal Plan - Simple Meals</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { color: #667eea; margin-bottom: 10px; font-size: 2.5em; }
        h2 { color: #667eea; margin-bottom: 20px; margin-top: 10px; }
        .back-link { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .recipe-button { display: block; width: 100%; padding: 20px; margin-bottom: 15px; background: #f8f9fa; border: 2px solid #667eea; border-radius: 10px; color: #667eea; font-size: 1.2em; font-weight: bold; cursor: pointer; text-align: left; transition: all 0.3s; }
        .recipe-button:hover { background: #667eea; color: white; }
        .recipe-meta { color: #666; font-size: 0.9em; margin-top: 5px; font-weight: normal; }
        .shopping-button { display: block; width: 100%; padding: 20px; margin-top: 30px; background: #4caf50; border: none; border-radius: 10px; color: white; font-size: 1.2em; font-weight: bold; cursor: pointer; }
        .calendar-button { display: block; width: 100%; padding: 20px; margin-top: 15px; background: #ff9800; border: none; border-radius: 10px; color: white; font-size: 1.2em; font-weight: bold; cursor: pointer; }
        .budget-info { background: #fff3e0; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; font-size: 1.1em; color: #e65100; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to Planner</a>
        <div id="results"></div>
    </div>
    <script>
        function displayMealPlan() {
            const stored = localStorage.getItem('mealPlan');
            if (!stored) {
                document.getElementById('results').innerHTML = '<h2>No meal plan found!</h2><p>Please go back and generate a meal plan first.</p>';
                return;
            }
            
            const mealPlan = JSON.parse(stored);
            const selected = mealPlan.recipes;
            const budget = mealPlan.budget;
            
            let totalCost = selected.reduce((sum, r) => sum + r.cost, 0);
            let html = '<h2>Your Meal Plan</h2>';
            
            // Create button for each recipe
            selected.forEach((recipe, index) => {
                html += `<button class="recipe-button" onclick="openRecipe(${index})">
                    ${recipe.name}
                    <div class="recipe-meta">Makes ${recipe.servings} • ${recipe.time}</div>
                </button>`;
            });
            
            html += `<div class="budget-info">Estimated weekly cost: $${totalCost} (Budget: $${budget})</div>`;
            html += `<button class="shopping-button" onclick="openShoppingList()">📋 View Shopping List</button>`;
            html += `<button class="calendar-button" onclick="openCalendar()">📅 View Weekly Calendar</button>`;
            
            document.getElementById('results').innerHTML = html;
        }
        
        function openRecipe(index) {
            localStorage.setItem('currentRecipeIndex', index);
            window.open('recipe.html', '_blank');
        }
        
        function openShoppingList() {
            window.open('shopping.html', '_blank');
        }
        
        function openCalendar() {
            window.open('calendar.html', '_blank');
        }
        
        // Display meal plan when page loads
        displayMealPlan();
    </script>
</body>
</html>
